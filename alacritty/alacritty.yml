import:
 - ~/.config/alacritty/catppuccin/catppuccin-mocha.yml

    #shell:
  #program: /usr/bin/tmux # <- set this to the path of your tmux installation

env:
  TERM: xterm-256color

window:
  padding:
    x: 6
    y: 6

  decorations: "none"
  opacity: 0.90

  # Window title
  title: Alacritty

  # Window class (Linux/BSD only):
  class:
    # Application instance name
    instance: Alacritty
    # General application class
    general: Alacritty

scrolling:
  history: 2000

font:
  normal:
    family: Hack Nerd Font
    style: Regular
  bold:
    family: Hack Nerd Font
    style: Bold
  italic:
    family: Hack Nerd Font
    style: Italic
  bold_italic:
    family:
    style: Bold Italic

  size: 13.0

  # Offset is the extra space around each character. `offset.y` can be thought of
  # as modifying the line spacing, and `offset.x` as modifying the letter spacing.
  offset:
    y: 1

      
# Colors (Tomorrow Night Bright)
colors:
  # Default colors
  #primary:
  # background: '#000000'
  # foreground: '#000000'

  # Colors the cursor will use if `custom_cursor_colors` is true
  #cursor:
  # text: '0x002b36'
  # cursor: '0x93a1a1'

  # Normal colors
  indexed_colors:
    - { index: 16, color: '0xcb4b16' }
    - { index: 17, color: '0xd33682' }
    - { index: 18, color: '0x073642' }
    - { index: 19, color: '0x586e75' }
    - { index: 20, color: '0x839496' }
    - { index: 21, color: '0xeee8d5' }

# The value `0.0` is completely transparent and `1.0` is opaque.

